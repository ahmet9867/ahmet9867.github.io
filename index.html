<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<title>Uygulamalarım</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;

  /* ANİMASYONLU ARKA PLAN */
  background: linear-gradient(270deg, #0f2027, #2c5364, #00ff88);
  background-size: 600% 600%;
  animation: bgAnim 10s ease infinite;
}

@keyframes bgAnim {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

h1 {
  margin-top: 50px;
  font-size: 40px;

  /* PARLAYAN YAZI */
  text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
}

.card {
  margin-top: 100px;
  background: rgba(34, 34, 34, 0.8);
  padding: 30px;
  display: inline-block;
  border-radius: 20px;

  /* GLASS EFFECT */
  backdrop-filter: blur(10px);

  /* HAFİF PARLAMA */
  box-shadow: 0 0 20px rgba(0,255,136,0.3);

  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(0,255,136,0.6);
}

button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;

  /* GRADIENT BUTON */
  background: linear-gradient(45deg, #00ff88, #00c3ff);
  color: black;

  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px #00ff88;
}
</style>
</head>

<body>

<h1>🚀 Uygulamalarım</h1>

<div class="card">
  <h2>Minecraft Tools App V1</h2>
  <p>mc web panel</p>

  <a href="https://github.com/ahmet9867/ahmet9867.github.io/releases/download/v1.0/Minecraft.Tools.App.Setup.1.0.0.exe">
    <button>İndir</button>
  </a>
</div>

</body>
</html>
